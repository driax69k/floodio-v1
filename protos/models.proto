syntax = "proto3";

package floodio;

message HazardMarker {
  string id = 1;
  double latitude = 2;
  double longitude = 3;
  string type = 4;
  string description = 5;
  int64 timestamp = 6;
  string sender_id = 7;
  string signature = 8;
  int32 trust_tier = 9;
}

message NewsItem {
  string id = 1;
  string title = 2;
  string content = 3;
  int64 timestamp = 4;
  string sender_id = 5;
  string signature = 6;
  int32 trust_tier = 7;
}

message SyncPayload {
  repeated HazardMarker markers = 1;
  repeated NewsItem news = 2;
}
